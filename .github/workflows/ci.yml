name: CI Action AWS KVS WebRTC JS SDK

on:
    push:
        branches:
            - master
            - develop
    pull_request:
        branches:
            - master
            - develop

jobs:
    nodejs-ubuntu-build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node: [18, 19, 20, 21, 22, 23]
            fail-fast: false
        steps:
            - name: Checkout repository
              uses: actions/checkout@master

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}

            - name: Install dependencies
              run: npm install

            - name: Run release
              run: npm run release

            - name: Generate dist hash (MD5)
              id: dist_hash
              run: |
                  DIST_HASH=$(tar -cf - dist | md5sum | awk '{ print $1 }')
                  echo "DIST_HASH=${DIST_HASH}" >> $GITHUB_ENV
                  echo "::set-output name=hash::${DIST_HASH}"

            - name: Upload dist hash as artifact
              uses: actions/upload-artifact@v3
              with:
                  name: dist-hash-${{ matrix.node }}
                  path: dist-hash.txt
              continue-on-error: true

    combined-summary:
        runs-on: ubuntu-latest
        needs: nodejs-ubuntu-build  # Ensure this job runs after all matrix jobs
        steps:
            - name: Download all dist hashes artifacts
              uses: actions/download-artifact@v3
              with:
                  name: dist-hash-*
                  path: ./dist-hashes/

            - name: Compare dist hashes across Node.js versions
              run: |
                  # Initialize an array to hold the hashes
                  declare -A dist_hashes

                  # Loop through the downloaded files and capture their contents
                  for file in ./dist-hashes/dist-hash-*.txt; do
                    node_version=$(basename "$file" | sed 's/dist-hash-//;s/.txt//')
                    hash_value=$(cat "$file")
                    dist_hashes["$node_version"]=$hash_value
                  done

                  # Check if all hashes match
                  match=true
                  for node_version in "${!dist_hashes[@]}"; do
                    for compare_version in "${!dist_hashes[@]}"; do
                      if [[ "$node_version" != "$compare_version" && "${dist_hashes[$node_version]}" != "${dist_hashes[$compare_version]}" ]]; then
                        match=false
                        break 2
                      fi
                    done
                  done

            - name: Create combined summary
              run: |
                  echo "## CI Summary" > $GITHUB_STEP_SUMMARY
                  echo "The dist folder hashes for all Node.js versions have been compared. Below are the results:" >> $GITHUB_STEP_SUMMARY

                  # Start table for hash comparison
                  echo "| Node.js Version | Hash | Match |" >> $GITHUB_STEP_SUMMARY
                  echo "|------------------|------|-------|" >> $GITHUB_STEP_SUMMARY

                  for node_version in "${!dist_hashes[@]}"; do
                    hash_value=${dist_hashes[$node_version]}
                    match_icon="✅"
                    for compare_version in "${!dist_hashes[@]}"; do
                      if [[ "$node_version" != "$compare_version" && "$hash_value" != "${dist_hashes[$compare_version]}" ]]; then
                        match_icon="❌"
                        break
                      fi
                    done
                    echo "| $node_version | $hash_value | $match_icon |" >> $GITHUB_STEP_SUMMARY
                  done

                  # Add final result
                  if [ "$match" = true ]; then
                    echo "All Node.js versions have matching dist hashes." >> $GITHUB_STEP_SUMMARY
                  else
                    echo "Some Node.js versions have mismatched dist hashes." >> $GITHUB_STEP_SUMMARY
                  fi
